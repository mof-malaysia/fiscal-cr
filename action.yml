name: 'FiscalCR'
description: 'AI-powered, model-agnostic code review for GitHub'
author: 'irfancoder'

branding:
  icon: 'eye'
  color: 'blue'

inputs:
  api_key:
    description: 'LLM API key'
    required: true
  github_token:
    description: 'GitHub token for API access'
    required: false
    default: ${{ github.token }}
  provider:
    description: 'Model provider: openai-compatible'
    required: false
  model:
    description: 'Model to use (overrides repo config when provided)'
    required: false
  base_url:
    description: 'Base URL for the OpenAI-compatible provider API'
    required: false
  user_agent:
    description: 'Custom User-Agent header for endpoints that whitelist clients'
    required: false
  language:
    description: 'Review comment language (overrides repo config when provided)'
    required: false
  fail_on:
    description: 'Fail the check on: critical, warning, never (overrides repo config when provided)'
    required: false
  config_path:
    description: 'Path to config file (relative to repo root)'
    required: false
    default: '.fiscalcr-review.yml'

outputs:
  review_summary:
    description: 'The review summary text'
  annotations_count:
    description: 'Number of annotations created'
  critical_count:
    description: 'Number of critical issues found'
  tokens_used:
    description: 'Total tokens used'
  cost_estimate:
    description: 'Estimated API cost in USD'

runs:
  using: 'node20'
  main: 'action/dist/index.js'
