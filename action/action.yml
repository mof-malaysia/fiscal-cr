name: 'Kimi Code Reviewer'
description: 'AI-powered code review using Moonshot Kimi with 256K context window'
author: 'kimi-code-reviewer'

branding:
  icon: 'eye'
  color: 'blue'

inputs:
  api_key:
    description: 'LLM API key (recommended generic input)'
    required: false
  kimi_api_key:
    description: 'Legacy: Moonshot AI API key (from platform.moonshot.ai)'
    required: false
  github_token:
    description: 'GitHub token for API access'
    required: false
    default: ${{ github.token }}
  provider:
    description: 'Model provider: kimi or openai-compatible'
    required: false
    default: 'openai-compatible'
  model:
    description: 'Model to use (e.g., kimi-k2.5, gpt-4.1, llama-3.3-70b)'
    required: false
    default: 'kimi-k2.5'
  max_output_tokens:
    description: 'Optional max completion tokens for model output (advanced)'
    required: false
  base_url:
    description: 'Generic base URL for provider API'
    required: false
  kimi_base_url:
    description: 'Legacy: base URL for Kimi API'
    required: false
  language:
    description: 'Review comment language (en, zh-TW, zh-CN, ja, ko)'
    required: false
    default: 'en'
  fail_on:
    description: 'Fail the check on: critical, warning, never'
    required: false
    default: 'critical'
  config_path:
    description: 'Path to config file (relative to repo root)'
    required: false
    default: '.kimi-review.yml'

outputs:
  review_summary:
    description: 'The review summary text'
  annotations_count:
    description: 'Number of annotations created'
  critical_count:
    description: 'Number of critical issues found'
  tokens_used:
    description: 'Total tokens used'
  cost_estimate:
    description: 'Estimated API cost in USD'

runs:
  using: 'node20'
  main: 'dist/index.js'
